<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0D0F1C 0%,#111429 40%,#160E2E 70%,#0D1220 100%); background-attachment:fixed; color:#eef0ff; overflow-x:hidden; }

    #bgCanvas { position:fixed; inset:0; z-index:0; }
    .overlay { position:fixed; inset:0; z-index:1; pointer-events:none;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(108,142,245,.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,212,170,.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(168,85,247,.04) 0%, transparent 60%); }

    .page { position:relative; z-index:2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }

    /* Card */
    .login-card {
      width:100%; max-width:420px;
      background:rgba(14,15,26,.85);
      backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px; padding:40px 36px;
      animation:fadeUp .4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* Logo */
    .logo-wrap { text-align:center; margin-bottom:28px; }
    .logo-icon {
      width:64px; height:64px; border-radius:18px;
      background:linear-gradient(135deg,#00D4AA,#009E7E);
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; margin:0 auto 16px;
      box-shadow:0 12px 40px rgba(0,212,170,.3);
      animation:float 3.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .logo-title { font-size:1.6rem; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; }
    .logo-title .grad { background:linear-gradient(135deg,#00D4AA,#5B8DEF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-tagline { font-size:.82rem; color:#00D4AA; font-weight:600; letter-spacing:.3px; }

    /* Tabs (login / register) */
    .tabs { display:flex; border-bottom:1px solid rgba(255,255,255,.07); margin-bottom:24px; }
    .tab { flex:1; text-align:center; padding:10px; cursor:pointer; color:#6b6b80; font-weight:600; font-size:.85rem; border-bottom:2px solid transparent; transition:all .2s; }
    .tab.active { color:#e8e8f0; border-bottom-color:var(--role-color, #00D4AA); }

    /* Form */
    .form-section { display:none; }
    .form-section.active { display:block; }

    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:.7rem; font-weight:700; color:#9a9ab0; margin-bottom:7px; text-transform:uppercase; letter-spacing:.7px; }

    .form-input, .form-select {
      width:100%; padding:13px 16px;
      background:rgba(255,255,255,.04);
      border:1.5px solid rgba(255,255,255,.08);
      border-radius:13px; color:#e8e8f0;
      font-size:.92rem; font-family:inherit;
      transition:all .2s; outline:none;
      appearance:none; -webkit-appearance:none;
    }
    .form-input:focus, .form-select:focus {
      border-color:var(--role-color, #00D4AA);
      box-shadow:0 0 0 3px rgba(0,212,170,.1);
    }
    .form-input::placeholder { color:#3a3a50; }

    /* Dropdown wrapper with arrow */
    .select-wrap { position:relative; }
    .select-wrap::after {
      content:'▾'; position:absolute; right:16px; top:50%; transform:translateY(-50%);
      color:#6b6b80; pointer-events:none; font-size:.9rem;
    }
    .form-select option { background:#0e0f1a; color:#e8e8f0; }

    /* Role indicator strip */
    .role-strip {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:12px; margin-bottom:20px;
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
      font-size:.78rem; font-weight:600; transition:all .3s;
    }
    .role-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* Submit button */
    .btn-submit {
      width:100%; padding:14px; border:none; border-radius:14px;
      font-size:.95rem; font-weight:800; font-family:inherit;
      cursor:pointer; transition:all .3s; margin-top:4px;
      background:linear-gradient(135deg,#00D4AA,#009E7E); color:#07080f;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(0,0,0,.35); }
    .btn-submit:disabled { opacity:.55; transform:none; cursor:wait; }

    /* Demo hint */
    .demo-hint {
      text-align:center; margin-top:16px; font-size:.72rem; color:#4a4a60;
      background:rgba(255,255,255,.025); border-radius:12px; padding:10px 14px;
    }
    .demo-hint strong { color:#7a7a90; }

    .lock-note { text-align:center; margin-top:12px; font-size:.72rem; color:#4a4a60; }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="overlay"></div>

  <div class="page">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">⬡</div>
        <div class="logo-title">Welcome to <span class="grad">VaultTag</span></div>
        <div class="logo-tagline">✦ Where Style Meets Trust ✦</div>
      </div>

      <!-- Tabs: Sign In / Register (register only shows for buyer) -->
      <div class="tabs">
        <div class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign In</div>
        <div class="tab" id="tabRegister" onclick="switchTab('register')" style="display:none">Register</div>
      </div>

      <!-- Sign In Form -->
      <div class="form-section active" id="sectionSignin">
        <form onsubmit="handleLogin(event)">
          <!-- Role dropdown -->
          <div class="form-group">
            <label class="form-label">Enter as</label>
            <div class="select-wrap">
              <select class="form-select" id="roleSelect" onchange="onRoleChange()">
                <option value="superadmin">👑 SuperAdmin</option>
                <option value="admin">🛡️ Admin</option>
                <option value="seller">🏪 Seller</option>
                <option value="buyer" selected>🛍️ Buyer</option>
              </select>
            </div>
          </div>

          <!-- Role strip indicator -->
          <div class="role-strip" id="roleStrip">
            <div class="role-dot" id="roleDot" style="background:#00D4AA"></div>
            <span id="roleLabel">Buyer — Browse, purchase &amp; verify authentic products</span>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="you@email.com" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">Sign In as Buyer</button>
        </form>
        <div class="demo-hint" id="demoHint">Demo: <strong>buyer@vaulttag.com</strong> / <strong>Buyer@123</strong></div>
      </div>

      <!-- Register Form (buyer only) -->
      <div class="form-section" id="sectionRegister">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="regName" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="regEmail" placeholder="you@email.com" required autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn-submit" id="regBtn" style="background:linear-gradient(135deg,#00D4AA,#009E7E);color:#07080f">Create Account</button>
        </form>
        <div class="demo-hint">Register a new buyer account</div>
      </div>

    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      const scene = new THREE.Scene();
      const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
      cam.position.z = 30;

      const N = 900, pos = new Float32Array(N*3), col = new Float32Array(N*3);
      const palette = [new THREE.Color('#00D4AA'),new THREE.Color('#5B8DEF'),new THREE.Color('#A855F7'),new THREE.Color('#FFB932')];
      for (let i=0;i<N;i++) {
        pos[i*3]=(Math.random()-.5)*70; pos[i*3+1]=(Math.random()-.5)*70; pos[i*3+2]=(Math.random()-.5)*50;
        const c=palette[i%4]; col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
      geo.setAttribute('color', new THREE.BufferAttribute(col,3));
      scene.add(new THREE.Points(geo, new THREE.PointsMaterial({size:.12,vertexColors:true,transparent:true,opacity:.5})));

      const addRing=(r,color,op)=>{const m=new THREE.Mesh(new THREE.TorusGeometry(r,.06,16,120),new THREE.MeshBasicMaterial({color,transparent:true,opacity:op}));scene.add(m);return m;};
      const r1=addRing(9,0x00D4AA,.2), r2=addRing(14,0x5B8DEF,.12), r3=addRing(19,0xA855F7,.07);
      let mx=0,my=0;
      document.addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=(e.clientY/innerHeight-.5)*2;});
      const pts=scene.children[0];
      (function animate(){requestAnimationFrame(animate);const t=Date.now()*.0003;
        pts.rotation.y=t*.25+mx*.08; pts.rotation.x=Math.sin(t*.4)*.08+my*.04;
        r1.rotation.x=t*.7; r1.rotation.y=t*.4+mx*.12;
        r2.rotation.x=-t*.35; r2.rotation.z=t*.5+my*.08;
        r3.rotation.y=t*.2; r3.rotation.x=t*.15;
        renderer.render(scene,cam);
      })();
      window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
    })();
  </script>

  <script src="/js/app.js"></script>
  <script>
    const REDIRECTS = {
      superadmin: '/superadmin-dashboard.html',
      admin:      '/admin-dashboard.html',
      seller:     '/dashboard.html',
      buyer:      '/buyer-dashboard.html'
    };

    const ROLE_META = {
      superadmin: { color:'#FFB932', label:'SuperAdmin — Platform control & global settings',       demo:'superadmin@vaulttag.com / Super@123',  btnText:'Sign In as SuperAdmin' },
      admin:      { color:'#A855F7', label:'Admin — Oversee sellers & manage disputes',              demo:'admin@vaulttag.com / Admin@123',        btnText:'Sign In as Admin' },
      seller:     { color:'#5B8DEF', label:'Seller — Mint NFTs, manage inventory & orders',         demo:'seller@vaulttag.com / Seller@123',      btnText:'Sign In as Seller' },
      buyer:      { color:'#00D4AA', label:'Buyer — Browse, purchase & verify authentic products',  demo:'buyer@vaulttag.com / Buyer@123',        btnText:'Sign In as Buyer' }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(location.search);
      const role = p.get('role');
      if (role && document.getElementById('roleSelect').querySelector(`option[value="${role}"]`)) {
        document.getElementById('roleSelect').value = role;
      }
      onRoleChange();
      if (location.hash === '#register') switchTab('register');
    });

    function onRoleChange() {
      const role = document.getElementById('roleSelect').value;
      const meta = ROLE_META[role];

      // Update CSS variable
      document.documentElement.style.setProperty('--role-color', meta.color);

      // Role strip
      document.getElementById('roleDot').style.background = meta.color;
      document.getElementById('roleDot').style.boxShadow = `0 0 8px ${meta.color}80`;
      document.getElementById('roleLabel').textContent = meta.label;

      // Button
      const btn = document.getElementById('loginBtn');
      btn.textContent = meta.btnText;
      const gradients = {
        superadmin: 'linear-gradient(135deg,#FFB932,#E6A020)',
        admin:      'linear-gradient(135deg,#A855F7,#8B3FD4)',
        seller:     'linear-gradient(135deg,#5B8DEF,#3B6FD4)',
        buyer:      'linear-gradient(135deg,#00D4AA,#009E7E)'
      };
      const textColors = { superadmin:'#07080f', admin:'#fff', seller:'#fff', buyer:'#07080f' };
      btn.style.background = gradients[role];
      btn.style.color = textColors[role];

      // Demo hint
      document.getElementById('demoHint').innerHTML = `Demo: <strong>${meta.demo.split(' / ')[0]}</strong> / <strong>${meta.demo.split(' / ')[1]}</strong>`;

      // Show/hide register tab (buyer only)
      const regTab = document.getElementById('tabRegister');
      regTab.style.display = role === 'buyer' ? '' : 'none';
      if (role !== 'buyer') switchTab('signin');

      // Input focus color
      document.querySelectorAll('.form-input, .form-select').forEach(el => {
        el.style.setProperty('--focus-color', meta.color);
      });
    }

    function switchTab(tab) {
      document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('sectionSignin').classList.toggle('active', tab === 'signin');
      document.getElementById('sectionRegister').classList.toggle('active', tab === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const role = document.getElementById('roleSelect').value;
      const btn  = document.getElementById('loginBtn');
      const orig = btn.textContent;
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await API.login(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        if (res.data.user.role !== role) {
          Toast.error(`This account is a "${res.data.user.role}", not a "${role}". Please select the correct role.`);
          btn.disabled = false; btn.textContent = orig; return;
        }
        Auth.setToken(res.data.token);
        Auth.setUser(res.data.user);
        Toast.success('Welcome, ' + res.data.user.name + '!');
        setTimeout(() => { location.href = REDIRECTS[role]; }, 500);
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false; btn.textContent = orig;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const res = await API.register(
          document.getElementById('regName').value,
          document.getElementById('regEmail').value,
          document.getElementById('regPassword').value
        );
        Auth.setToken(res.data.token);
        Auth.setUser(res.data.user);
        Toast.success('Account created! Welcome to VaultTag.');
        setTimeout(() => { location.href = REDIRECTS['buyer']; }, 500);
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
