<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:80px 24px; }
    .auth-card { width:100%; max-width:440px; }
    .auth-card h1 { font-size:2rem; margin-bottom:8px; text-align:center; }
    .auth-card>p { color:var(--text-secondary); text-align:center; margin-bottom:32px; }
    .auth-tabs { display:flex; border-bottom:1px solid var(--border-primary); margin-bottom:28px; }
    .auth-tab {
      flex:1; text-align:center; padding:12px; cursor:pointer;
      color:var(--text-secondary); font-weight:500; font-size:0.9rem;
      border-bottom:2px solid transparent; transition:all var(--transition-fast);
    }
    .auth-tab.active { color:var(--text-primary); border-bottom-color:var(--accent); }
    .auth-form { display:none; }
    .auth-form.active { display:block; }
    .auth-footer { text-align:center; margin-top:24px; font-size:0.85rem; color:var(--text-muted); }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--text-muted); font-size:0.8rem; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border-primary); }
  </style>
</head>
<body>
  <div class="particles-bg" id="particles"></div>
  <nav class="navbar scrolled"><div class="container">
    <a href="/" class="nav-logo"><div class="logo-icon">⬡</div>VaultTag</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/verify.html">Verify</a></li>
    </ul>
    <div class="nav-actions"></div>
  </div></nav>

  <section class="auth-page">
    <div class="auth-card card-glass">
      <h1>Welcome to <span class="text-gradient">VaultTag</span></h1>
      <p>Sign in to manage your NFTs</p>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="admin@vaulttag.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">Sign In</button>
        <div class="auth-footer">Demo: admin@vaulttag.com / Admin@123</div>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="regName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="regBtn">Create Account</button>
      </form>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initParticles(document.getElementById('particles'));
      if (Auth.isLoggedIn()) {
        window.location.href = Auth.isAdmin() ? '/dashboard.html' : '/my-nfts.html';
      }
      if (window.location.hash === '#register') switchTab('register');
    });

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)));
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await API.login(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        Auth.setToken(res.data.token);
        Auth.setUser(res.data.user);
        Toast.success('Welcome back!');
        setTimeout(() => {
          window.location.href = res.data.user.role === 'admin' ? '/dashboard.html' : '/my-nfts.html';
        }, 500);
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating...';
      try {
        const res = await API.register(
          document.getElementById('regName').value,
          document.getElementById('regEmail').value,
          document.getElementById('regPassword').value
        );
        Auth.setToken(res.data.token);
        Auth.setUser(res.data.user);
        Toast.success('Account created!');
        setTimeout(() => { window.location.href = '/my-nfts.html'; }, 500);
      } catch (err) {
        Toast.error(err.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
