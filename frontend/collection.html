<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .collection-page {
      padding-top: 90px;
      padding-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      background-attachment: fixed;
      color: #eef0ff;
      min-height: 100vh;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .2;
      animation: orbDrift 10s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #7B2FBE, transparent);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #00D4AA, transparent);
      bottom: -60px;
      right: -60px;
      animation-delay: 3s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #5B8DEF, transparent);
      top: 50%;
      left: 60%;
      animation-delay: 6s;
    }

    @keyframes orbDrift {
      from {
        transform: translate(0, 0) scale(1)
      }

      to {
        transform: translate(30px, -40px) scale(1.1)
      }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar .form-input {
      max-width: 300px;
    }

    .filter-bar select {
      max-width: 160px;
    }

    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
    }

    .page-btn {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-surface);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .page-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="bg-orbs">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="bg-grid"></div>
  <nav class="navbar scrolled">
    <div class="container">
      <a href="/" class="nav-logo">
        <div class="logo-icon">⬡</div>VaultTag
      </a>
      <ul class="nav-links"></ul>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </nav>

  <section class="collection-page">
    <div class="container">
      <h1 style="font-size:1.8rem;margin-bottom:8px">NFT <span class="text-gradient">Collection</span></h1>
      <p style="color:var(--text-secondary);margin-bottom:24px">Browse all authenticated products</p>

      <div class="filter-bar">
        <input type="text" class="form-input" id="searchInput" placeholder="Search by name or ID..."
          oninput="debounceLoad()">
        <select class="form-input form-select" id="statusFilter" onchange="loadCollection()" style="display:none">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="redeemed">Redeemed</option>
        </select>
        <select class="form-input form-select" id="categoryFilter" onchange="loadCollection()">
          <option value="">All Categories</option>
          <option value="Footwear">Footwear</option>
          <option value="Clothing">Clothing</option>
          <option value="Artwork">Artwork</option>
          <option value="Accessories">Accessories</option>
          <option value="Electronics">Electronics</option>
        </select>
      </div>

      <div class="product-grid" id="collectionGrid">
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    let currentPage = 1;
    let debounceTimer;

    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      // Show status filter only for admin
      if (Auth.isAdmin()) document.getElementById('statusFilter').style.display = '';
      loadCollection();
    });

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadCollection, 300);
    }

    async function loadCollection(page = 1) {
      currentPage = page;
      const grid = document.getElementById('collectionGrid');
      const search = document.getElementById('searchInput').value.trim();
      const status = document.getElementById('statusFilter').value;
      const category = document.getElementById('categoryFilter').value;

      const params = new URLSearchParams({ page, limit: 12 });
      if (search) params.set('search', search);
      if (status) params.set('status', status);
      if (category) params.set('category', category);

      grid.innerHTML = `
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>`;

      try {
        let nfts = [], pagination = {};

        if (Auth.isAdmin()) {
          // Admin sees everything including redeemed/unminted
          const res = await API.getAllNfts(params.toString());
          nfts = res.data.nfts;
          pagination = res.data.pagination;
        } else {
          // Buyer — use browse endpoint (active products only, no sensitive fields)
          const buyerParams = new URLSearchParams({ page, limit: 12 });
          if (search) buyerParams.set('search', search);
          if (category) buyerParams.set('category', category);
          const res = await API.browseNfts(buyerParams.toString());
          nfts = res.data.nfts;
          pagination = res.data.pagination;

          // Filter out products the buyer already owns
          if (Auth.isLoggedIn()) {
            try {
              const myRes = await API.getMyNfts();
              const ownedIds = new Set((myRes.data?.nfts || []).map(n => String(n.tokenId)));
              nfts = nfts.filter(n => !ownedIds.has(String(n.tokenId)));
            } catch (e) { /* silently skip if fails */ }
          }
        }

        if (nfts.length === 0) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>No products found</h3><p>Try adjusting your filters</p></div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        grid.innerHTML = nfts.map(n => `
          <div class="product-card" onclick="window.location.href='/product.html?id=${n.tokenId}&name=${encodeURIComponent(n.productName)}&price=${n.price}&cat=${encodeURIComponent(n.category)}&status=${n.status}&img=${encodeURIComponent(n.imageUrl || '')}'" >
            <div class="product-card-image">
              <img src="${n.imageUrl || 'https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600'}" alt="${n.productName}" loading="lazy"
                onerror="this.src='https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600'">
            </div>
            <div class="product-card-body">
              <div class="product-card-name">${n.productName}</div>
              <div class="product-card-meta">
                <span class="product-card-price">${formatPrice(n.price)}</span>
                <span class="badge badge-${n.status}">${n.status.toUpperCase()}</span>
              </div>
              <div style="margin-top:8px;font-size:0.75rem;color:var(--text-muted)">Token #${n.tokenId} • ${n.category}</div>
            </div>
          </div>
        `).join('');

        // Pagination
        if (pagination.pages > 1) {
          let html = '';
          for (let i = 1; i <= pagination.pages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadCollection(${i})">${i}</button>`;
          }
          document.getElementById('pagination').innerHTML = html;
        } else {
          document.getElementById('pagination').innerHTML = '';
        }
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Error loading</h3><p>' + e.message + '</p></div>';
      }
    }
  </script>
</body>

</html>
