<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .cart-page { padding-top: 100px; padding-bottom: 80px; min-height: 100vh; }
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }

    /* Cart items */
    .cart-items { display: flex; flex-direction: column; gap: 16px; }
    .cart-item {
      display: grid; grid-template-columns: 88px 1fr auto;
      gap: 20px; align-items: center;
      background: var(--bg-surface); border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg); padding: 16px;
      transition: border-color var(--transition-fast);
    }
    .cart-item:hover { border-color: var(--border-glow); }
    .cart-item__img {
      width: 88px; height: 88px; border-radius: var(--radius-md);
      object-fit: cover; background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .cart-item__img-placeholder {
      width: 88px; height: 88px; border-radius: var(--radius-md);
      background: var(--bg-secondary); display: flex;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 1.5rem; flex-shrink: 0;
    }
    .cart-item__name { font-family: var(--font-display); font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
    .cart-item__meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
    .cart-item__price { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: var(--gold); }
    .cart-item__remove {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 8px; border-radius: var(--radius-sm);
      transition: all var(--transition-fast); flex-shrink: 0;
    }
    .cart-item__remove:hover { color: var(--danger); background: rgba(226,75,74,0.1); }

    /* Order summary */
    .order-summary {
      background: var(--bg-surface); border: 1px solid var(--border-primary);
      border-radius: var(--radius-xl); padding: 28px; position: sticky; top: 100px;
    }
    .order-summary h2 { font-size: 1.2rem; margin-bottom: 24px; }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
      font-size: 0.9rem; color: var(--text-secondary);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-row.total {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.2rem; color: var(--text-primary); margin-top: 8px;
    }
    .summary-row.total span:last-child { color: var(--gold); }
    .btn-checkout {
      width: 100%; margin-top: 24px; padding: 16px;
      background: linear-gradient(135deg, #ff4d4d, #ff6b35);
      color: #fff; border: none; border-radius: 50px;
      font-family: var(--font-display); font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s;
      box-shadow: 0 8px 28px rgba(255,77,77,0.35);
    }
    .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(255,77,77,0.5); }
    .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Empty state */
    .cart-empty {
      text-align: center; padding: 80px 20px;
      background: var(--bg-surface); border: 1px solid var(--border-primary);
      border-radius: var(--radius-xl);
    }
    .cart-empty .icon { font-size: 4rem; margin-bottom: 16px; }
    .cart-empty h3 { font-size: 1.4rem; margin-bottom: 8px; }
    .cart-empty p { color: var(--text-secondary); margin-bottom: 24px; }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
      .cart-item { grid-template-columns: 72px 1fr auto; gap: 12px; }
      .cart-item__img, .cart-item__img-placeholder { width: 72px; height: 72px; }
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled"><div class="container">
    <a href="/" class="nav-logo"><div class="logo-icon">⬡</div>VaultTag</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/collection.html">Collection</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div></nav>

  <section class="cart-page">
    <div class="container">
      <h1 style="font-size:1.8rem;margin-bottom:8px">Your <span class="text-gradient">Cart</span></h1>
      <p style="color:var(--text-secondary);margin-bottom:32px">Review your items before checkout</p>

      <div id="cartRoot"></div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const root = document.getElementById('cartRoot');
      const items = Cart.getItems();

      if (items.length === 0) {
        root.innerHTML = `
          <div class="cart-empty">
            <div class="icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Browse the collection and add items you love.</p>
            <a href="/collection.html" class="btn btn-primary">Browse Collection</a>
          </div>`;
        return;
      }

      const total = Cart.total();
      const fee   = total * 0.025;          // 2.5% platform fee
      const grand = total + fee;

      root.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items" id="cartItemsList">
            ${items.map(item => `
              <div class="cart-item" id="ci-${item.tokenId}">
                ${item.imageUrl
                  ? `<img class="cart-item__img" src="${item.imageUrl}" alt="${item.productName}">`
                  : `<div class="cart-item__img-placeholder">👟</div>`}
                <div>
                  <div class="cart-item__name">${item.productName}</div>
                  <div class="cart-item__meta">Token #${item.tokenId} &nbsp;•&nbsp; ${item.category}</div>
                  <div class="cart-item__price">${formatPrice(item.price)}</div>
                </div>
                <button class="cart-item__remove" onclick="removeItem('${item.tokenId}')" title="Remove">
                  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                  </svg>
                </button>
              </div>
            `).join('')}
          </div>

          <div class="order-summary">
            <h2>Order Summary</h2>
            ${items.map(item => `
              <div class="summary-row">
                <span>${item.productName.length > 22 ? item.productName.slice(0,22)+'…' : item.productName}</span>
                <span>${formatPrice(item.price)}</span>
              </div>
            `).join('')}
            <div class="summary-row">
              <span>Platform fee (2.5%)</span>
              <span>${formatPrice(fee)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(grand)}</span>
            </div>
            <button class="btn-checkout" onclick="proceedToCheckout()">
              Buy Now — ${formatPrice(grand)}
            </button>
            <a href="/collection.html" class="btn btn-secondary" style="width:100%;margin-top:12px;text-align:center;display:block;">
              Continue Shopping
            </a>
          </div>
        </div>`;
    }

    function removeItem(tokenId) {
      const el = document.getElementById('ci-' + tokenId);
      if (el) {
        el.style.transition = 'opacity 0.25s, transform 0.25s';
        el.style.opacity = '0';
        el.style.transform = 'translateX(20px)';
        setTimeout(() => {
          Cart.remove(tokenId);
          renderCart();
        }, 250);
      }
    }

    function proceedToCheckout() {
      const items = Cart.getItems();
      if (items.length === 0) return;
      const subtotal = Cart.total();
      const fee      = subtotal * 0.025;
      sessionStorage.setItem('vt_checkout', JSON.stringify({
        items,
        subtotal,
        fee,
        grand: subtotal + fee
      }));
      window.location.href = '/checkout.html';
    }
  </script>
</body>
</html>
