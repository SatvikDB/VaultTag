<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page {
      padding-top: 90px;
      padding-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      background-attachment: fixed;
      color: #eef0ff;
      min-height: 100vh;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .2;
      animation: orbDrift 10s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #7B2FBE, transparent);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #00D4AA, transparent);
      bottom: -60px;
      right: -60px;
      animation-delay: 3s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #5B8DEF, transparent);
      top: 50%;
      left: 60%;
      animation-delay: 6s;
    }

    @keyframes orbDrift {
      from {
        transform: translate(0, 0) scale(1)
      }

      to {
        transform: translate(30px, -40px) scale(1.1)
      }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .order-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .order-id {
      font-family: var(--font-mono);
      font-size: .9rem;
      color: var(--accent);
      font-weight: 700;
    }

    .order-date {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .order-items-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .order-item-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: .8rem;
    }

    .order-item-chip img {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
    }

    .order-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
    }
  </style>
</head>

<body>
  <div class="bg-orbs">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="bg-grid"></div>
  <nav class="navbar scrolled">
    <div class="container">
      <a href="/" class="nav-logo">
        <div class="logo-icon">⬡</div>VaultTag
      </a>
      <ul class="nav-links"></ul>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </nav>

  <section class="page">
    <div class="container">
      <h1 style="font-size:1.8rem;margin-bottom:8px">My <span class="text-gradient">Orders</span></h1>
      <p style="color:var(--text-secondary);margin-bottom:28px">Track your purchase history and payment status</p>
      <div class="orders-list" id="ordersList">
        <div class="empty">
          <div class="spinner" style="margin:0 auto 12px"></div>Loading...
        </div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.requireAuth()) return;
      try {
        const res = await API.getMyOrders();
        const orders = res.data.orders;
        const list = document.getElementById('ordersList');
        if (!orders.length) {
          list.innerHTML = `<div class="empty"><div style="font-size:3rem;margin-bottom:12px">📭</div><h3>No orders yet</h3><p style="color:var(--text-secondary)">Browse the collection and make your first purchase.</p><a href="/collection.html" class="btn btn-primary" style="margin-top:16px">Browse Collection</a></div>`;
          return;
        }
        const statusColor = { pending: 'var(--warning)', accepted: 'var(--success)', rejected: 'var(--danger)', completed: 'var(--accent)' };
        list.innerHTML = orders.map(o => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <div class="order-id">${o.orderId}</div>
                <div class="order-date">${formatDate(o.createdAt)}</div>
              </div>
              <span class="badge" style="background:${(statusColor[o.status] || 'var(--text-muted)')}22;color:${statusColor[o.status] || 'var(--text-muted)'}">${o.status.toUpperCase()}</span>
            </div>
            <div class="order-items-row">
              ${o.items.map(i => `<div class="order-item-chip">${i.imageUrl ? `<img src="${i.imageUrl}" alt="">` : '👟'}<span>${i.productName}</span><strong style="color:var(--gold)">${formatPrice(i.price)}</strong></div>`).join('')}
            </div>
            <div class="order-meta">
              <span style="font-family:var(--font-display);font-weight:700;color:var(--gold)">${formatPrice(o.total)}</span>
              <span style="font-size:.78rem;background:var(--bg-secondary);padding:4px 10px;border-radius:var(--radius-full);color:var(--text-secondary)">💳 ${o.paymentMethod.toUpperCase()}</span>
              ${o.paymentRef ? `<span style="font-family:var(--font-mono);font-size:.72rem;color:var(--text-muted)">Ref: ${o.paymentRef.slice(0, 20)}${o.paymentRef.length > 20 ? '...' : ''}</span>` : ''}
            </div>
            ${o.adminNote ? `<div style="margin-top:10px;font-size:.82rem;color:var(--text-secondary);padding:8px 12px;background:var(--bg-secondary);border-radius:var(--radius-sm)">📝 Admin: ${o.adminNote}</div>` : ''}
            ${o.status === 'accepted' ? '<div style="margin-top:8px;font-size:.78rem;color:var(--success)">✅ Payment confirmed — check your email for confirmation</div>' : ''}
            ${o.status === 'pending' ? '<div style="margin-top:8px;font-size:.78rem;color:var(--warning)">⏳ Awaiting admin payment verification</div>' : ''}
          </div>`).join('');
      } catch (e) {
        document.getElementById('ordersList').innerHTML = `<div class="empty" style="color:var(--danger)">${e.message}</div>`;
      }
    });
  </script>
</body>

</html>
