<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My NFTs — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .my-page { padding-top:90px; padding-bottom:60px; }
    .my-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
    .user-info { display:flex; align-items:center; gap:14px; }
    .user-avatar {
      width:48px; height:48px; border-radius:50%; background:var(--accent-dim);
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; font-weight:700; color:var(--accent); border:2px solid var(--accent);
    }
    .user-name { font-weight:600; }
    .user-email { font-size:0.8rem; color:var(--text-secondary); }
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-state h3 { font-size:1.3rem; margin-bottom:8px; }
  </style>
</head>
<body>
  <nav class="navbar scrolled"><div class="container">
    <a href="/" class="nav-logo"><div class="logo-icon">⬡</div>VaultTag</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/my-nfts.html" class="active">My NFTs</a></li>
      <li><a href="/verify.html">Verify</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div></nav>

  <section class="my-page">
    <div class="container">
      <div class="my-header">
        <div class="user-info">
          <div class="user-avatar" id="avatar">?</div>
          <div>
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </div>
        <div style="display:flex;gap:12px">
          <a href="/verify.html" class="btn btn-secondary btn-sm">🔍 Verify Product</a>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
      </div>

      <h1 style="font-size:1.5rem;margin-bottom:24px">My <span class="text-gradient">Collection</span></h1>

      <div class="product-grid" id="myGrid">
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      const user = Auth.getUser();
      if (user) {
        document.getElementById('avatar').textContent = (user.name || 'U')[0].toUpperCase();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
      }
      loadMyNfts();
    });

    async function loadMyNfts() {
      const grid = document.getElementById('myGrid');
      try {
        const res = await API.getMyNfts();
        const nfts = res.data.nfts;

        if (nfts.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div style="font-size:3rem;margin-bottom:12px">📭</div>
              <h3>No NFTs Yet</h3>
              <p style="color:var(--text-secondary);margin-bottom:20px">You don't own any NFTs. When a product is transferred to you, it will appear here.</p>
              <a href="/verify.html" class="btn btn-primary">Verify a Product</a>
            </div>`;
          return;
        }

        grid.innerHTML = nfts.map(n => `
          <div class="product-card" onclick="window.location.href='/product.html?id=${n.tokenId}'">
            <div class="product-card-image">
              <img src="${n.imageUrl || 'https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600'}" alt="${n.productName}" loading="lazy">
            </div>
            <div class="product-card-body">
              <div class="product-card-name">${n.productName}</div>
              <div class="product-card-meta">
                <span class="product-card-price">${formatPrice(n.price)}</span>
                <span class="badge badge-${n.status}">${n.status.toUpperCase()}</span>
              </div>
              <div style="margin-top:8px;font-size:0.75rem;color:var(--text-muted)">Token #${n.tokenId} • ${n.category}</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Error</h3><p>'+e.message+'</p></div>';
      }
    }
  </script>
</body>
</html>
