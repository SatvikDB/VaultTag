<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My NFTs — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .my-page {
      padding-top: 90px;
      padding-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0f0c29 0%, #302b63 45%, #24243e 100%);
      background-attachment: fixed;
      color: #eef0ff;
      min-height: 100vh;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .2;
      animation: orbDrift 10s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #7B2FBE, transparent);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #00D4AA, transparent);
      bottom: -60px;
      right: -60px;
      animation-delay: 3s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #5B8DEF, transparent);
      top: 50%;
      left: 60%;
      animation-delay: 6s;
    }

    @keyframes orbDrift {
      from {
        transform: translate(0, 0) scale(1)
      }

      to {
        transform: translate(30px, -40px) scale(1.1)
      }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .03) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    .my-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .user-name {
      font-weight: 600;
    }

    .user-email {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="bg-orbs">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="bg-grid"></div>
  <nav class="navbar scrolled">
    <div class="container">
      <a href="/" class="nav-logo">
        <div class="logo-icon">⬡</div>VaultTag
      </a>
      <ul class="nav-links"></ul>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </nav>

  <section class="my-page">
    <div class="container">
      <div class="my-header">
        <div class="user-info">
          <div class="user-avatar" id="avatar">?</div>
          <div>
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </div>
        <div style="display:flex;gap:12px">
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
      </div>

      <h1 style="font-size:1.5rem;margin-bottom:24px">My <span class="text-gradient">Collection</span></h1>

      <div class="product-grid" id="myGrid">
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
        <div class="skeleton" style="height:380px;border-radius:var(--radius-lg)"></div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      const user = Auth.getUser();
      if (user) {
        document.getElementById('avatar').textContent = (user.name || 'U')[0].toUpperCase();
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
      }
      loadMyNfts();
    });

    async function loadMyNfts() {
      const grid = document.getElementById('myGrid');
      try {
        const res = await API.getMyNfts();
        const nfts = res.data.nfts;

        if (nfts.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div style="font-size:3rem;margin-bottom:12px">📭</div>
              <h3>No NFTs Yet</h3>
              <p style="color:var(--text-secondary);margin-bottom:20px">You don't own any NFTs. When a product is transferred to you, it will appear here.</p>
            </div>`;
          return;
        }

        grid.innerHTML = nfts.map(n => `
          <div class="product-card" onclick="window.location.href='/product.html?id=${n.tokenId}&name=${encodeURIComponent(n.productName)}&price=${n.price}&cat=${encodeURIComponent(n.category)}&status=${n.status}&img=${encodeURIComponent(n.imageUrl || '')}'">
            <div class="product-card-image">
              <img src="${n.imageUrl || 'https://images.unsplash.com/photo-1556906781-9a412961c28c?w=600'}" alt="${n.productName}" loading="lazy">
            </div>
            <div class="product-card-body">
              <div class="product-card-name">${n.productName}</div>
              <div class="product-card-meta">
                <span class="product-card-price">${formatPrice(n.price)}</span>
                <span class="badge badge-${n.status}">${n.status.toUpperCase()}</span>
              </div>
              <div style="margin-top:8px;font-size:0.75rem;color:var(--text-muted)">Token #${n.tokenId} • ${n.category}</div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>Error</h3><p>' + e.message + '</p></div>';
      }
    }
  </script>
</body>

</html>
