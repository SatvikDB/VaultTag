<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — VaultTag</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-page { padding-top:100px; padding-bottom:60px; min-height:100vh; }
    .profile-layout { display:grid; grid-template-columns:300px 1fr; gap:32px; align-items:start; }
    .profile-card { background:var(--bg-surface); border:1px solid var(--border-primary); border-radius:var(--radius-lg); padding:32px 24px; text-align:center; }
    .profile-avatar { width:96px; height:96px; border-radius:50%; background:var(--accent-dim); color:var(--accent); font-size:2.5rem; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; border:2px solid var(--accent); }
    .profile-name { font-size:1.5rem; margin-bottom:4px; }
    .profile-email { color:var(--text-secondary); font-size:0.95rem; margin-bottom:16px; }
    .profile-stats { display:flex; justify-content:space-around; margin-top:24px; padding-top:24px; border-top:1px solid var(--border-primary); }
    .stat-box { text-align:center; }
    .stat-val { font-size:1.5rem; font-weight:700; font-family:var(--font-display); }
    .stat-lbl { font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }

    .settings-card { background:var(--bg-surface); border:1px solid var(--border-primary); border-radius:var(--radius-lg); padding:32px; }
    .settings-card h2 { font-size:1.3rem; margin-bottom:24px; padding-bottom:12px; border-bottom:1px solid var(--border-primary); }

    @media(max-width:768px) { .profile-layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar scrolled"><div class="container">
    <a href="/" class="nav-logo"><div class="logo-icon">⬡</div>VaultTag</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/my-nfts.html">My NFTs</a></li>
      <li><a href="/verify.html">Verify</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div></nav>

  <section class="profile-page">
    <div class="container">
      <div class="profile-layout">
        <div class="profile-card">
          <div class="profile-avatar" id="pAvatar">?</div>
          <h1 class="profile-name" id="pName">Loading...</h1>
          <div class="profile-email" id="pEmail"></div>
          <div style="margin-top:8px"><span class="badge" id="pRoleBadge">USER</span></div>

          <div class="profile-stats">
            <div class="stat-box">
              <div class="stat-val" id="sOwned">—</div>
              <div class="stat-lbl">Owned NFTs</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" id="sRedeemed" style="color:var(--danger)">—</div>
              <div class="stat-lbl">Redeemed</div>
            </div>
          </div>

          <button class="btn btn-secondary" style="width:100%;margin-top:24px" onclick="Auth.logout()">Logout</button>
        </div>

        <div class="settings-card">
          <h2>Account Settings</h2>
          <form id="profileForm" onsubmit="handleUpdate(event)">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-input" id="iName" required disabled>
              <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Name updates are disabled in demo mode.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-input" id="iEmail" disabled>
              <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Email cannot be changed as it is tied to your NFT ownership.</div>
            </div>

            <h3 style="font-size:1.1rem;margin:32px 0 16px;padding-top:24px;border-top:1px solid var(--border-subtle)">Change Password</h3>
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-input" placeholder="••••••••">
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input type="password" class="form-input" placeholder="New password">
            </div>
            <button type="button" class="btn btn-primary" onclick="Toast.info('Password update disabled in demo mode')">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.requireAuth()) return;
      const user = Auth.getUser();
      if (user) {
        document.getElementById('pAvatar').textContent = (user.name || 'U')[0].toUpperCase();
        document.getElementById('pName').textContent = user.name;
        document.getElementById('pEmail').textContent = user.email;
        document.getElementById('iName').value = user.name;
        document.getElementById('iEmail').value = user.email;

        const badge = document.getElementById('pRoleBadge');
        if (user.role === 'admin') {
          badge.className = 'badge badge-admin';
          badge.textContent = 'ADMIN';
        } else {
          badge.className = 'badge badge-active';
          badge.textContent = 'BUYER';
        }
      }

      // Fetch stats for buyer
      try {
        const res = await API.getMyNfts();
        const nfts = res.data.nfts || [];
        const activeCount = nfts.filter(n => n.status === 'active').length;
        const redeemedCount = nfts.filter(n => n.status === 'redeemed' || n.redeemed).length;

        document.getElementById('sOwned').textContent = activeCount;
        document.getElementById('sRedeemed').textContent = redeemedCount;
      } catch(e) {
        console.error('Failed to load stats', e);
      }
    });

    function handleUpdate(e) {
      e.preventDefault();
      Toast.info('Profile updates disabled in demo mode');
    }
  </script>
</body>
</html>
